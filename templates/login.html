{% extends "base.html" %}
{% block content %}
<section class="card form-card">
    <h2>{{ lang_data.login_title }}</h2>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

        <label for="email">{{ lang_data.email_label }}</label>
        <input type="email" id="email" name="email" required autocomplete="username" />

        <label for="password">{{ lang_data.password_label }}</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />

        <label>
            <input type="checkbox" name="remember_me" />
            {{ lang_data.remember_me_label }}
        </label>

        <button type="submit" class="btn">{{ lang_data.login_btn }}</button>
    </form>
    <p style="text-align:center;margin-top:1rem;">
        <a href="{{ url_for('forgot_password') }}">{{ lang_data.forgot_password_link }}</a>
    </p>
    <p class="hint">Only admin-approved accounts can login. Two-factor authentication via authenticator app is required.</p>
</section>
{% endblock %}
