{% extends "base.html" %}
{% block content %}
<section class="card form-card">
    <h2>{{ lang_data.login_heading }}</h2>
    <form method="POST" autocomplete="off">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

        <label>{{ lang_data.login_email }}</label>
        <input
            type="email"
            name="email"
            required
            autocomplete="username"
            spellcheck="false"
        />

        <label>{{ lang_data.login_password }}</label>
        <input
            type="password"
            name="password"
            required
            autocomplete="current-password"
        />

        <label>
            <input type="checkbox" name="remember_me" />
            {{ lang_data.login_remember }}
        </label>

        <button type="submit" class="btn">{{ lang_data.login_btn }}</button>
    </form>
    <p class="hint">{{ lang_data.login_hint }}</p>
</section>
{% endblock %}
