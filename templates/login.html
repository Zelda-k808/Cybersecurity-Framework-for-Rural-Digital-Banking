{% extends "base.html" %}
{% block content %}
<section class="card form-card">
    <h2>Login</h2>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <label>Email</label>
        <input type="email" name="email" required />

        <label>Password</label>
        <input type="password" name="password" required />

        <label>
            <input type="checkbox" name="remember_me" />
            Keep me signed in on this device
        </label>

        <button type="submit" class="btn">Login and Send OTP</button>
    </form>
    <p class="hint">Only admin-approved accounts can login. OTP is delivered to your registered email.</p>
</section>
{% endblock %}
