{% extends "base.html" %}
{% block content %}
<section class="card form-card">
    <h2>{{ lang_data.otp_heading }}</h2>
    <p>{{ lang_data.otp_sent_to }} <strong>{{ email }}</strong></p>
    <p class="hint">{{ lang_data.otp_hint }}</p>
    <form method="POST" autocomplete="off">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <label>{{ lang_data.otp_label }}</label>
        <input
            type="text"
            name="otp"
            required
            minlength="6"
            maxlength="6"
            pattern="[0-9]{6}"
            inputmode="numeric"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            placeholder="••••••"
        />
        <button type="submit" class="btn">{{ lang_data.otp_verify_btn }}</button>
    </form>
    <form method="POST" action="{{ url_for('resend_otp') }}" autocomplete="off">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <button type="submit" class="btn alt">{{ lang_data.otp_resend_btn }}</button>
    </form>
</section>
{% endblock %}
