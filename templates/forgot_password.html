{% extends "base.html" %}
{% block content %}
<section class="card form-card">
    <h2>{{ lang_data.forgot_password_title }}</h2>
    <p class="hint">{{ lang_data.forgot_password_hint }}</p>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

        <label for="email">{{ lang_data.email_label }}</label>
        <input type="email" id="email" name="email" required autocomplete="email" />

        <button type="submit" class="btn">{{ lang_data.forgot_password_btn }}</button>
    </form>
</section>
{% endblock %}
