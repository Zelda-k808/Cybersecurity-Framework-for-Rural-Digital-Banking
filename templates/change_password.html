{% extends "base.html" %}
{% block content %}
<section class="card form-card">
    <h2>{{ lang_data.change_password_title }}</h2>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

        <label for="current_password">{{ lang_data.current_password_label }}</label>
        <input type="password" id="current_password" name="current_password" required autocomplete="current-password" />

        <label for="new_password">{{ lang_data.new_password_label }}</label>
        <input type="password" id="new_password" name="new_password" required minlength="8" autocomplete="new-password" />

        <label for="confirm_password">{{ lang_data.confirm_password_label }}</label>
        <input type="password" id="confirm_password" name="confirm_password" required minlength="8" autocomplete="new-password" />

        <button type="submit" class="btn">{{ lang_data.change_password_btn }}</button>
    </form>
</section>
{% endblock %}
