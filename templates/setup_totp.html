{% extends "base.html" %}
{% block content %}
<section class="card form-card text-center">
    <h2>{{ lang_data.setup_totp_title }}</h2>
    <p class="hint">{{ lang_data.setup_totp_hint }}</p>
    <div class="qr-wrap">
        <img src="data:image/png;base64,{{ qr_code }}" alt="{{ lang_data.setup_totp_title }}" />
    </div>
    <p class="hint">
        <strong>{{ lang_data.setup_totp_secret_label }}</strong><br>
        <span class="secret-code">{{ secret }}</span>
    </p>
    <hr class="divider">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <label for="totp">{{ lang_data.totp_label }}</label>
        <input type="text" id="totp" name="totp" required pattern="\d{6}" maxlength="6" inputmode="numeric" autocomplete="one-time-code" style="max-width:200px; text-align:center;" />
        <button type="submit" class="btn">{{ lang_data.totp_verify_btn }}</button>
    </form>
</section>
{% endblock %}
