{% extends "base.html" %}
{% block content %}
<section class="card form-card">
    <h2>{{ lang_data.setup_totp_title }}</h2>
    <p class="hint">{{ lang_data.setup_totp_hint }}</p>
    <div style="text-align:center; margin:1.5rem 0;">
        <img src="data:image/png;base64,{{ qr_code }}" alt="{{ lang_data.setup_totp_title }}" style="max-width:240px;" />
    </div>
    <p class="hint" style="text-align:center;">
        <strong>{{ lang_data.setup_totp_secret_label }}</strong><br>
        <code style="font-size:1.2rem; letter-spacing:0.1rem;">{{ secret }}</code>
    </p>
    <hr style="margin:1.5rem 0;">
    <form method="POST" style="text-align:center;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <label for="totp" style="display:block; margin-bottom:0.5rem;">{{ lang_data.totp_label }}</label>
        <input type="text" id="totp" name="totp" required pattern="\d{6}" maxlength="6" inputmode="numeric" autocomplete="one-time-code" style="max-width:200px; text-align:center; margin-bottom:1rem;" />
        <br>
        <button type="submit" class="btn">{{ lang_data.totp_verify_btn }}</button>
    </form>
</section>
{% endblock %}
