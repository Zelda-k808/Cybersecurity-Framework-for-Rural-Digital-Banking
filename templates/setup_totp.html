{% extends "base.html" %}
{% block content %}
<section class="card form-card">
    <h2>{{ lang_data.setup_totp_title }}</h2>
    <p class="hint">{{ lang_data.setup_totp_hint }}</p>
    <div style="text-align:center; margin:1.5rem 0;">
        <img src="data:image/png;base64,{{ qr_code }}" alt="{{ lang_data.setup_totp_title }}" style="max-width:240px;" />
    </div>
    <p class="hint" style="text-align:center;">
        <strong>{{ lang_data.setup_totp_secret_label }}</strong><br>
        <code style="font-size:1.2rem; letter-spacing:0.1rem;">{{ secret }}</code>
    </p>
    <div style="text-align:center; margin-top:1.5rem;">
        <a class="btn" href="{{ url_for('login') }}">{{ lang_data.back_btn }}</a>
    </div>
</section>
{% endblock %}
