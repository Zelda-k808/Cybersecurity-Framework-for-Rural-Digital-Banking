{% extends "base.html" %}
{% block content %}
<section class="card form-card">
    <h2>{{ lang_data.register_title }}</h2>
    <p class="hint">{{ lang_data.register_hint }}</p>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

        <label for="full_name">{{ lang_data.full_name_label }}</label>
        <input type="text" id="full_name" name="full_name" required maxlength="100" autocomplete="name" />

        <label for="email">{{ lang_data.email_label }}</label>
        <input type="email" id="email" name="email" required autocomplete="email" />

        <label for="password">{{ lang_data.password_label }}</label>
        <input type="password" id="password" name="password" required minlength="8"
               autocomplete="new-password" />

        <button type="submit" class="btn">{{ lang_data.register_btn }}</button>
    </form>
</section>
{% endblock %}
