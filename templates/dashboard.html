{% extends "base.html" %}
{% block content %}
<section class="card">
    <h2>Dashboard</h2>
    <p><strong>Welcome:</strong> {{ current_user.full_name }}</p>
    <p class="balance">Available Balance: INR {{ "%.2f"|format(balance) }}</p>
    <div class="button-row">
        <a class="btn" href="{{ url_for('transfer') }}">Send Money</a>
        <a class="btn alt" href="{{ url_for('history') }}">View History</a>
    </div>
</section>
{% endblock %}
