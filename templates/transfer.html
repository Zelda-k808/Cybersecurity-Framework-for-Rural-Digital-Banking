{% extends "base.html" %}
{% block content %}
<section class="card form-card">
    <h2>{{ lang_data.transfer_title }}</h2>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

        <label for="receiver">{{ lang_data.receiver_name_label }}</label>
        <input type="text" id="receiver" name="receiver" required maxlength="80" />

        <label for="receiver_account">{{ lang_data.receiver_account_label }}</label>
        <input type="text" id="receiver_account" name="receiver_account"
               required pattern="\d{11}" maxlength="11" minlength="11"
               placeholder="e.g. 10123456789"
               title="Must be exactly 11 digits" />

        <label for="amount">{{ lang_data.amount_label }}</label>
        <input type="number" id="amount" name="amount" step="0.01" min="0.01" required />

        <label for="note">{{ lang_data.note_label }}</label>
        <input type="text" id="note" name="note" maxlength="120" />

        <button type="submit" class="btn">{{ lang_data.transfer_btn }}</button>
    </form>
</section>
{% endblock %}
