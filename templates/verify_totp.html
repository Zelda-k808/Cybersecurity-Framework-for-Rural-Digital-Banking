{% extends "base.html" %}
{% block content %}
<section class="card form-card">
    <h2>Verify TOTP</h2>
    <p class="hint">Enter the 6-digit code from your authenticator app.</p>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

        <label for="totp">6-digit TOTP Code</label>
        <input type="text" id="totp" name="totp" required pattern="\d{6}" maxlength="6" inputmode="numeric" autocomplete="one-time-code" />

        <button type="submit" class="btn">Verify</button>
    </form>
</section>
{% endblock %}
