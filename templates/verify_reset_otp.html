{% extends "base.html" %}
{% block content %}
<section class="card form-card">
    <h2>{{ lang_data.verify_reset_title }}</h2>
    <p class="hint">{{ lang_data.otp_label }} {{ email }}</p>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

        <label for="otp">{{ lang_data.otp_label }} {{ email }}</label>
        <input type="text" id="otp" name="otp" required pattern="\d{6}" maxlength="6" inputmode="numeric" autocomplete="one-time-code" />

        <button type="submit" class="btn">{{ lang_data.verify_reset_btn }}</button>
    </form>
</section>
{% endblock %}
